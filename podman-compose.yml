services:
  deepwiki:
    build:
      context: .
      dockerfile: Containerfile
      args:
        AST_CHUNKING: ${AST_CHUNKING:-false}
    ports:
      - "${PORT:-8001}:${PORT:-8001}"
      - "3000:3000"
    env_file:
      - .env
    environment:
      - PORT=${PORT:-8001}
      - NODE_ENV=production
      - SERVER_BASE_URL=http://localhost:${PORT:-8001}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - LOG_FILE_PATH=${LOG_FILE_PATH:-api/logs/application.log}
    volumes:
      - /var/home/b08x/.adaflow:/root/.adalflow:Z      # Added :Z for SELinux compatibility in Podman
      - ./api/logs:/app/api/logs:Z
      - ./api/config:/app/api/config:ro,Z
      - /var/home/b08x/Workspace:/data:Z
    # Resource limits
    deploy:
      resources:
        limits:
          memory: 6144M
        reservations:
          memory: 2048M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${PORT:-8001}/health"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    extra_hosts:
      - "host.containers.internal:host-gateway"
      - "host.docker.internal:host-gateway" # Keep for compatibility
